<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAIRI Studio - Math Shooter</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style> body { margin: 0; padding: 0; overflow: hidden; background: #000; } canvas { display: block; } </style>
</head>
<style>
    body { 
        margin: 0; padding: 0; overflow: hidden; background: #000;
        width: 100vw;
        height: 100dvh; /* 動的な高さを取得 */
        display: flex;
        justify-content: center;
        align-items: center;
    }
    /* Phaserが作るキャンバスを、親要素（body）に絶対従わせる */
    canvas {
        max-width: 100% !important;
        max-height: 100% !important;
        object-fit: contain; /* 比率を守って最大化 */
    }
</style>
<body>
<script>
// スマホかPCかを判定
const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);

const config = {
    type: Phaser.AUTO,
    scale: {
        // スマホもPCも RESIZE に統一して、画面を使い切る
        mode: Phaser.Scale.RESIZE,
        autoCenter: Phaser.Scale.CENTER_BOTH,
        // width, height は指定せず、ブラウザのサイズに追従させます
    },
    // ...以下同じ
    input: { activePointers: 3 },
    physics: { default: 'arcade', arcade: { gravity: { y: 1500 }, debug: false } },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let player, enemies, bombs, bullets = [], shipGroup, keys, spaceKey, ground, bg;
let isGameOver = false, isQuizActive = false, isClear = false, isWaitingToStart = true;
let distanceText, bgm; 
let lastDirection = 'right', lastShootTime = 0;
let lastWasBomb = false; // 爆弾の連続出現防止フラグ
const WORLD_WIDTH = 15000; 
const GOAL_DISTANCE = 10000; 

let moveLeft = false, moveRight = false, doJump = false;

function preload() {
    this.load.image('player_sprite', 'player.png');
    this.load.image('background', 'bg.png');
    this.load.image('enemy_sprite', 'enemy.png');
    this.load.image('ship_sprite', 'ship.png');
    this.load.image('bomb_sprite', 'bomb.png');
    this.load.audio('main_bgm', 'bgm.mp3');
}

function create() {
    isGameOver = false; isQuizActive = false; isClear = false; isWaitingToStart = true;
    bullets = []; 

const W = this.scale.width;
    const H = this.scale.height;

    // 世界の高さはH、横幅は固定の WORLD_WIDTH
    this.physics.world.setBounds(0, 0, WORLD_WIDTH, H);

    // 背景も H に合わせて配置
    bg = this.add.tileSprite(0, H, WORLD_WIDTH, 1500, 'background');
    bg.setOrigin(0, 1).setScrollFactor(0);

    // 地面も H に合わせて配置
    const GROUND_HEIGHT = 40;
    ground = this.add.rectangle(WORLD_WIDTH / 2, H - (GROUND_HEIGHT / 2), WORLD_WIDTH, GROUND_HEIGHT, 0xaaaaaa);
    this.physics.add.existing(ground, true);

    // プレイヤーの初期位置を H に合わせる
    player = this.physics.add.sprite(300, H - 100, 'player_sprite');
    player.setScale(0.15).setOrigin(0.5, 1);
    player.body.setCollideWorldBounds(true);
    player.body.setSize(player.width * 0.6, player.height * 0.9).setOffset(player.width * 0.2, player.height * 0.1);

    // ★ 修正6: カメラの範囲もHに合わせる
    this.cameras.main.setBounds(0, 0, WORLD_WIDTH, H);
    this.cameras.main.startFollow(player, true, 0.1, 0.1);

    enemies = this.physics.add.group();
    bombs = this.physics.add.group();
    shipGroup = this.physics.add.staticGroup();

    // ★ 修正7: 宇宙船(クイズ)も地面(H)の上に置く
    for(let x = 2000; x < GOAL_DISTANCE; x += 2000) {
        const s = this.add.sprite(x, H - 20, 'ship_sprite');
        s.setScale(0.5).setOrigin(0, 1);
        this.physics.add.existing(s, true);
        const shipHitW = s.width * 0.45;
        const shipHitH = s.height * 0.6;
        s.body.setSize(shipHitW, shipHitH).setOffset(s.width * 0.1, s.height - shipHitH);
        shipGroup.add(s);
    }

// create関数の中にある distanceText の部分を探して書き換えてください
distanceText = this.add.text(W / 2, 20, '', { 
    fontSize: '32px', 
    color: '#fff', 
    fontStyle: 'bold', 
    stroke: '#000', 
    strokeThickness: 8, 
    padding: { top: 20, bottom: 10 }
}).setOrigin(0.5, 0).setScrollFactor(0).setDepth(10002); // setOrigin(0.5, 0)で中央揃えに
    bgm = this.sound.add('main_bgm', { volume: 0.15, loop: true });

    createStartButton(this);

    // ★ 修正8: ここもisMobileで判定（前回追加した部分）
    if (isMobile) { 
        createTouchControls(this); 
    }

    keys = this.input.keyboard.addKeys('W,A,S,D');
    spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

    this.physics.add.collider(player, enemies, onPlayerHit, null, this);
    this.physics.add.collider(player, shipGroup, startQuiz, null, this);
    this.physics.add.collider(player, bombs, onPlayerHit, null, this);
    this.physics.add.collider(player, ground);
    this.physics.add.collider(enemies, ground);
    this.physics.add.collider(bombs, ground); 

// create 関数の最後の方に追加
if (isMobile) {
    // どんな画面サイズでも、高さが 720px 相当に見えるようにズーム率を計算
    const targetHeight = 720;
    const zoomLevel = H / targetHeight;
    this.cameras.main.setZoom(zoomLevel);
}

}

function createTouchControls(scene) {
    const W = scene.scale.width;
    const H = scene.scale.height;
    
    // ボタンの共通設定
    const btnSize = 75; // 「うつ」ボタンと同じ大きさに統一
    const topMargin = 100; // 画面上端からの距離

    const btn = (x, y, txt, start, end, isFire = false) => {
        // ボタンの本体（円）
        let color = isFire ? 0xff0000 : 0xffffff;
        let alpha = isFire ? 0.4 : 0.2;
        let c = scene.add.circle(x, y, btnSize, color, alpha)
            .setInteractive()
            .setScrollFactor(0)
            .setDepth(10000);
            
        c.on('pointerdown', start);
        c.on('pointerup', end);
        c.on('pointerout', end);
        
        // ボタンの文字
        scene.add.text(x, y, txt, { 
            fontSize: isFire ? '24px' : '40px', 
            fontStyle: 'bold' 
        }).setOrigin(0.5).setScrollFactor(0).setDepth(10001);
    };

    // --- 左上：移動ボタン ---
    // 指で隠れないよう、少し内側に寄せて配置
    btn(100, topMargin, '←', () => moveLeft = true, () => moveLeft = false);
    btn(270, topMargin, '→', () => moveRight = true, () => moveRight = false);

    // --- 右上：アクションボタン ---
    const rightSideX = W - 120;

    // 攻撃ボタン（上段の一番右）
    btn(rightSideX, topMargin, 'うつ', () => { 
        if(!isQuizActive && !isWaitingToStart) shoot(scene); 
    }, () => {}, true);

    // ジャンプボタン（攻撃ボタンの左隣、または下）
    // 今回は押しやすさを考え、攻撃ボタンのすぐ下に配置してみます
    btn(rightSideX, topMargin + 170, '↑', () => doJump = true, () => doJump = false); 
}


function playSE(scene, type) {
    const ctx = scene.sound.context;
    if (type === 'shoot') {
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.type = 'square'; osc.frequency.setValueAtTime(1200, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.05);
        gain.gain.setValueAtTime(0.05, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.05);
    } else if (type === 'hit') {
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(1000, ctx.currentTime);
        gain.gain.setValueAtTime(0.08, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.08);
    } else if (type === 'destroy') {
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(40, ctx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.12, ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.15);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.15);
    } else if (type === 'quiz_correct') {
        [523.25, 1046.50].forEach((freq, i) => {
            const osc = ctx.createOscillator(); const gain = ctx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(freq, ctx.currentTime + (i * 0.1));
            gain.gain.setValueAtTime(0.15, ctx.currentTime + (i * 0.1));
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + (i * 0.1) + 0.2);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(ctx.currentTime + (i * 0.1)); osc.stop(ctx.currentTime + (i * 0.1) + 0.2);
        });
    } else if (type === 'quiz_wrong') {
        [150, 150].forEach((freq, i) => {
            const osc = ctx.createOscillator(); const gain = ctx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(freq, ctx.currentTime + (i * 0.15));
            gain.gain.setValueAtTime(0.3, ctx.currentTime + (i * 0.15));
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + (i * 0.15) + 0.1);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(ctx.currentTime + (i * 0.15)); osc.stop(ctx.currentTime + (i * 0.15) + 0.15);
        });
    } else if (type === 'dead') {
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.type = 'square'; osc.frequency.setValueAtTime(100, ctx.currentTime);
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.3);
    }
}

function playClearJingle(scene) {
    const ctx = scene.sound.context;
    const melody = [523.25, 659.25, 783.99, 659.25, 1046.50];
    const timings = [0, 0.15, 0.3, 0.45, 0.6];
    melody.forEach((freq, i) => {
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.type = 'triangle'; osc.frequency.setValueAtTime(freq, ctx.currentTime + timings[i]);
        gain.gain.setValueAtTime(0.4, ctx.currentTime + timings[i]);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + timings[i] + 0.2);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(ctx.currentTime + timings[i]); osc.stop(ctx.currentTime + timings[i] + 0.25);
    });
}

function createStartButton(scene) {
    const centerX = scene.cameras.main.width / 2;
    const centerY = scene.cameras.main.height / 2;
    const startButton = scene.add.rectangle(centerX, centerY, 400, 100, 0xffffff, 0.2).setInteractive().setScrollFactor(0).setStrokeStyle(4, 0xffffff);
    const startText = scene.add.text(centerX, centerY, 'スタート', { fontSize: '48px', color: '#fff', fontStyle: 'bold' }).setOrigin(0.5).setScrollFactor(0);
    startButton.on('pointerdown', () => { isWaitingToStart = false; startButton.destroy(); startText.destroy(); if (bgm) bgm.play(); scheduleNextSpawn(scene); scheduleNextBombSpawn(scene); });
}

function startQuiz(player, ship) {
    if (isQuizActive || isClear || isWaitingToStart) return;
    isQuizActive = true; player.setVelocityX(0);
    const centerX = this.cameras.main.worldView.centerX, centerY = this.cameras.main.worldView.centerY;
    const pW = 500, pH = 400, topY = centerY - (pH / 2);
    const overlay = this.add.rectangle(centerX, centerY, pW, pH, 0x000000, 0.95).setStrokeStyle(4, 0xffffff);
    const title = this.add.text(centerX, topY + 40, 'もんだい', { fontSize: '28px', color: '#ffff00' }).setOrigin(0.5);
    const qText = this.add.text(centerX, topY + 120, '', { fontSize: '50px', color: '#fff' }).setOrigin(0.5);
    const buttons = [];
    for (let i = 0; i < 3; i++) {
        const btnY = topY + 210 + (i * 65);
        const btn = this.add.rectangle(centerX, btnY, 200, 45, 0x333333).setInteractive().setStrokeStyle(2, 0xffffff);
        const txt = this.add.text(centerX, btnY, '', { fontSize: '28px', color: '#fff' }).setOrigin(0.5);
        btn.txt = txt;
        btn.on('pointerdown', () => { 
            if (btn.val === btn.ans) { playSE(this, 'quiz_correct'); [overlay, title, qText, ...buttons, ...buttons.map(b=>b.txt)].forEach(obj => obj.destroy()); ship.destroy(); isQuizActive = false; } 
            else { playSE(this, 'quiz_wrong'); btn.setFillStyle(0xff0000); this.time.delayedCall(300, () => generateProblem(qText, buttons)); } 
        });
        buttons.push(btn);
    }
    generateProblem(qText, buttons);
}

function generateProblem(qText, buttons) {
    let n1, n2, ans, sign;
    if (Math.random() > 0.5) { n1 = Phaser.Math.Between(1, 10); n2 = Phaser.Math.Between(1, 9); ans = n1 + n2; sign = '＋'; } 
    else { n1 = Phaser.Math.Between(5, 15); n2 = Phaser.Math.Between(1, n1); ans = n1 - n2; sign = '－'; }
    qText.setText(`${n1} ${sign} ${n2} = ?`);
    const options = [ans, ans + 1, ans - 1]; Phaser.Utils.Array.Shuffle(options);
    buttons.forEach((btn, i) => { btn.val = options[i]; btn.txt.setText(options[i]); btn.ans = ans; btn.setFillStyle(0x333333); });
}

function update(time) {
    if (isGameOver || isClear || isWaitingToStart) { if (player.body) player.setVelocityX(0); return; }
    distanceText.setText(`ゴールまで あと ${Math.max(0, Math.floor((GOAL_DISTANCE - player.x) / 10))}m`);
    if (player.x >= GOAL_DISTANCE) { handleClear(this); return; }
    bg.tilePositionX = this.cameras.main.scrollX * 0.4;
    enemies.getChildren().forEach(e => { if (e.body.velocity.x > 0) e.setFlipX(false); else e.setFlipX(true); });
    if (this.input.activePointer.isDown && time > lastShootTime + 200 && !isQuizActive && this.input.activePointer.x > 300 && this.input.activePointer.x < window.innerWidth - 200) { shoot(this); lastShootTime = time; }
    if (!isQuizActive) { 
        if (keys.A.isDown || moveLeft) { player.setVelocityX(-400); player.setFlipX(true); lastDirection = 'left'; } 
        else if (keys.D.isDown || moveRight) { player.setVelocityX(400); player.setFlipX(false); lastDirection = 'right'; } 
        else { player.setVelocityX(0); } 
    }
    if ((keys.W.isDown || spaceKey.isDown || doJump) && player.body.blocked.down) player.setVelocityY(-800);
    bullets = bullets.filter(b => { 
        if (!b.active) return false; 
        this.physics.overlap(b, enemies, (bullet, enemy) => { 
            let hp = enemy.getData('hp') - 1; enemy.setData('hp', hp); enemy.setTint(0xff0000); 
            if (hp <= 0) { playSE(this, 'destroy'); enemy.destroy(); } else { playSE(this, 'hit'); }
            this.time.delayedCall(100, () => { if(enemy && enemy.active) enemy.clearTint(); }); 
            bullet.active = false; bullet.destroy(); 
        }); return b.active; 
    });
}

// クリアした時
function handleClear(scene) {
    if (isClear) return;
    isClear = true;
    if(bgm) bgm.stop(); // BGMを止める

    // ★ 修正1: クリア時のジングルを鳴らす（ここはそのまま）
    playClearJingle(scene); 

    const W = scene.scale.width;
    const H = scene.scale.height;

    // ★ 修正2: 「クリア！！」の文字を「スタート」と同じスタイルにする
    const clearButton = scene.add.rectangle(W / 2, H / 2, 400, 100, 0xffffff, 0.2)
        .setScrollFactor(0)
        .setStrokeStyle(4, 0xffffff)
        .setDepth(20000); // 最前面に

    const clearText = scene.add.text(W / 2, H / 2, 'クリア！！', { 
        fontSize: '48px', // 「スタート」と同じサイズ
        color: '#fff', 
        fontStyle: 'bold' 
    }).setOrigin(0.5).setScrollFactor(0).setDepth(20001); // 文字を枠の上に

    // 文字を少しだけフワフワさせる演出（オプション：なくても良いです）
    scene.tweens.add({
        targets: clearText,
        y: clearText.y - 10,
        duration: 300,
        yoyo: true, // 往復
        repeat: -1, // 無限に繰り返す
        ease: 'Sine.easeInOut'
    });

    // ★ 修正3: プレイヤーを白く光らせる（点滅エフェクト）
    if (player.body) {
        player.setVelocityX(0); // 動きを止める
        
        // プレイヤーの色を白に固定（これが「光る」ベース）
        player.setTint(0xffffff); 
        
        // プレイヤーを点滅させる
        scene.tweens.add({
            targets: player,
            alpha: { from: 1, to: 0.2 }, // 1（不透明）から0.2（ほぼ透明）へ
            duration: 150, // 0.15秒で
            yoyo: true, // 往復
            repeat: -1, // 無限に繰り返す
            ease: 'Linear'
        });
    }

    // ★ 修正4: 敵を全部消す（ここはそのまま）
    enemies.clear(true, true);
    bombs.clear(true, true);

    // ★ 修正5: 5秒後にリロード（ここはそのまま）
    scene.time.delayedCall(5000, () => {
        window.location.reload(); 
    });
}



// プレイヤーが死んだ時
function onPlayerHit() {
    if (!isGameOver && !isClear && !isWaitingToStart) {
        isGameOver = true;
        if(bgm) bgm.stop();
        playSE(this, 'dead');
        player.setTint(0xff0000);
        // ここを書き換え：スマホの画面崩れをリセットするためリロードする
        this.time.delayedCall(1000, () => {
            window.location.reload(); 
        });
    }
}



function spawnEnemy(scene) { 
    if (isGameOver || isClear || isWaitingToStart) return; 

    // ★ 画面の高さ(H)を動的に取得
    const H = scene.scale.height;
    const isFromLeft = Math.random() < 0.30; 
    const cam = scene.cameras.main;
    const spawnX = isFromLeft ? cam.scrollX - 150 : cam.scrollX + cam.width + 150; 

    // ★ Hを使って地面の上に配置
    const e = scene.physics.add.sprite(spawnX, H - 100, 'enemy_sprite'); 
    e.setScale(0.22).setOrigin(0.5, 1); 
    e.setData('hp', 4); 
    enemies.add(e); 
    
    scene.physics.add.collider(e, ground); 
    
    e.body.setSize(e.width * 0.4, e.height * 0.6).setOffset((e.width - e.width * 0.4) / 2, e.height - e.height * 0.6); 
    
    if (isFromLeft) { 
        e.body.setVelocityX(200); 
        e.setTint(0xffaa00); 
    } else { 
        e.body.setVelocityX(-100); 
    } 
}



function spawnBomb(scene) { 
    if (isGameOver || isClear || isWaitingToStart) return; 

    // ★ 画面の高さ(H)を動的に取得
    const H = scene.scale.height;
    const cam = scene.cameras.main;
    const spawnX = cam.scrollX + cam.width + 100; 

    // ★ Hを使って地面のすぐ上に配置
    const b = scene.physics.add.sprite(spawnX, H - 40, 'bomb_sprite'); 
    b.setScale(0.08).setOrigin(0.5, 1); 
    bombs.add(b); 
    
    scene.physics.add.collider(b, ground); 
    b.body.setVelocityX(-200); 
}




function scheduleNextSpawn(scene) { scene.time.delayedCall(Phaser.Math.Between(2000, 4500), () => { if (!isGameOver && !isClear && !isWaitingToStart) { spawnEnemy(scene); scheduleNextSpawn(scene); } }); }

// 修正：出現率を下げ、連続出現を禁止
function scheduleNextBombSpawn(scene) { 
    scene.time.delayedCall(1800, () => { // チェック間隔を少し伸ばした
        if (!isGameOver && !isClear && !isWaitingToStart) {
            // 出現率を20%に下げ、かつ「前回が爆弾じゃなかった時」だけ出現チャンス
            if (!lastWasBomb && Math.random() < 0.2) { 
                spawnBomb(scene); 
                lastWasBomb = true; // 今回出したのでフラグを立てる
            } else {
                lastWasBomb = false; // 出さなかったのでフラグを折る（次は出せる）
            }
        }
        scheduleNextBombSpawn(scene); 
    }); 
}

function shoot(scene) { if (isWaitingToStart) return; playSE(scene, 'shoot'); const b = scene.add.rectangle(player.x + (lastDirection === 'right' ? 45 : -45), player.y - 70, 25, 6, 0xffff00); scene.physics.add.existing(b); b.body.setAllowGravity(false); b.body.setVelocityX(lastDirection === 'left' ? -1500 : 1500); b.active = true; bullets.push(b); scene.time.delayedCall(1000, () => { if(b.active) { b.active = false; b.destroy(); } }); }
</script>
</body>
</html>
