<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KAIRI Studio - Math Shooter</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style> 
        body { margin: 0; padding: 0; overflow: hidden; background: #000; touch-action: none; }
        /* 縦画面の時に警告を出す（スマホのみ） */
        @media screen and (orientation: portrait) {
            #orientation-warning { display: flex !important; }
        }
        #orientation-warning {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: white; z-index: 10000;
            justify-content: center; align-items: center; text-align: center; font-family: sans-serif;
        }
    </style>
</head>
<body>
    <div id="orientation-warning"><h1>画面を横向きにして<br>リロードしてください</h1></div>
<script>
// PCかスマホかを判定
const isMobile = !Phaser.Device.Os.desktop;

const config = {
    type: Phaser.AUTO,
    scale: {
        mode: isMobile ? Phaser.Scale.FIT : Phaser.Scale.NONE, // PCはリサイズせず固定
        autoCenter: Phaser.Scale.CENTER_BOTH,
        width: 1280,
        height: 720
    },
    physics: { default: 'arcade', arcade: { gravity: { y: 1500 }, debug: false } },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let player, enemies, bombs, bullets = [], shipGroup, keys, spaceKey, ground, bg;
let isGameOver = false, isQuizActive = false, isClear = false, isWaitingToStart = true;
let distanceText, bgm; 
let lastDirection = 'right', lastShootTime = 0;
let lastWasBomb = false;
const WORLD_WIDTH = 15000; 
const GOAL_DISTANCE = 10000; 

let moveLeft = false, moveRight = false, doJump = false;

function preload() {
    this.load.image('player_sprite', 'player.png');
    this.load.image('background', 'bg.png');
    this.load.image('enemy_sprite', 'enemy.png');
    this.load.image('ship_sprite', 'ship.png');
    this.load.image('bomb_sprite', 'bomb.png');
    this.load.audio('main_bgm', 'bgm.mp3');
}

function create() {
    const gameH = 720;
    isGameOver = false; isQuizActive = false; isClear = false; isWaitingToStart = true;
    bullets = []; 
    this.physics.world.setBounds(0, 0, WORLD_WIDTH, gameH);

    bg = this.add.tileSprite(0, gameH, WORLD_WIDTH, 1500, 'background').setOrigin(0, 1).setScrollFactor(0);
    ground = this.add.rectangle(WORLD_WIDTH / 2, gameH - 20, WORLD_WIDTH, 40, 0xaaaaaa);
    this.physics.add.existing(ground, true);

    const goalLine = this.add.rectangle(GOAL_DISTANCE, gameH / 2, 20, gameH, 0xff0000, 0.5);
    this.add.text(GOAL_DISTANCE, gameH / 2 - 100, 'GOAL', { fontSize: '60px', color: '#ff0000', fontStyle: 'bold' }).setOrigin(0.5);

    player = this.physics.add.sprite(300, gameH - 100, 'player_sprite').setScale(0.15).setOrigin(0.5, 1);
    player.body.setCollideWorldBounds(true);
    player.body.setSize(player.width * 0.6, player.height * 0.9).setOffset(player.width * 0.2, player.height * 0.1);

    this.cameras.main.setBounds(0, 0, WORLD_WIDTH, gameH);
    this.cameras.main.startFollow(player, true, 0.1, 0.1);

    enemies = this.physics.add.group();
    bombs = this.physics.add.group();
    shipGroup = this.physics.add.staticGroup();

    for(let x = 2000; x < GOAL_DISTANCE; x += 2000) {
        let s = shipGroup.create(x, gameH - 20, 'ship_sprite').setScale(0.5).setOrigin(0, 1).refreshBody();
        s.body.setSize(s.width * 0.45, s.height * 0.6).setOffset(s.width * 0.1, s.height * 0.4);
    }

    distanceText = this.add.text(20, 30, '', { fontSize: '32px', color: '#fff', fontStyle: 'bold', stroke: '#000', strokeThickness: 8 }).setScrollFactor(0);
    bgm = this.sound.add('main_bgm', { volume: 0.15, loop: true });

    createStartButton(this);
    if (isMobile) { createTouchControls(this); }

    keys = this.input.keyboard.addKeys('W,A,S,D');
    spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

    this.physics.add.collider(player, ground);
    this.physics.add.collider(player, enemies, onPlayerHit, null, this);
    this.physics.add.collider(player, shipGroup, startQuiz, null, this);
    this.physics.add.collider(player, bombs, onPlayerHit, null, this);
    this.physics.add.collider(enemies, ground);
    this.physics.add.collider(bombs, ground);
}

function createTouchControls(scene) {
    const W = 1280; const H = 720;
    const btn = (x, y, txt, start, end) => {
        let c = scene.add.circle(x, y, 80, 0xffffff, 0.3).setInteractive().setScrollFactor(0);
        c.on('pointerdown', start); c.on('pointerup', end); c.on('pointerout', end);
        scene.add.text(x, y, txt, { fontSize: '60px' }).setOrigin(0.5).setScrollFactor(0);
    };
    btn(150, H - 120, '←', () => moveLeft = true, () => moveLeft = false);
    btn(350, H - 120, '→', () => moveRight = true, () => moveRight = false);
    btn(W - 120, H - 300, '↑', () => doJump = true, () => doJump = false);
    let f = scene.add.circle(W - 150, H - 120, 100, 0xff0000, 0.5).setInteractive().setScrollFactor(0);
    f.on('pointerdown', () => { if(!isQuizActive && !isWaitingToStart) shoot(scene); });
    scene.add.text(W - 150, H - 120, 'FIRE', { fontSize: '35px', fontStyle: 'bold' }).setOrigin(0.5).setScrollFactor(0);
}

function createStartButton(scene) {
    const startButton = scene.add.rectangle(640, 360, 400, 100, 0xffffff, 0.2).setInteractive().setScrollFactor(0).setStrokeStyle(4, 0xffffff);
    const startText = scene.add.text(640, 360, 'スタート', { fontSize: '48px', color: '#fff', fontStyle: 'bold' }).setOrigin(0.5).setScrollFactor(0);
    startButton.on('pointerdown', () => {
        if (isMobile) { scene.scale.startFullscreen(); }
        isWaitingToStart = false; startButton.destroy(); startText.destroy(); 
        if (bgm) bgm.play(); scheduleNextSpawn(scene); scheduleNextBombSpawn(scene);
    });
}

function update(time) {
    if (isGameOver || isClear || isWaitingToStart) { if (player.body) player.setVelocityX(0); return; }
    distanceText.setText(`ゴールまで あと ${Math.max(0, Math.floor((GOAL_DISTANCE - player.x) / 10))}m`);
    if (player.x >= GOAL_DISTANCE) { handleClear(this); return; }
    bg.tilePositionX = this.cameras.main.scrollX * 0.4;
    
    if (!isQuizActive) {
        if (keys.A.isDown || moveLeft) { player.setVelocityX(-400); player.setFlipX(true); lastDirection = 'left'; }
        else if (keys.D.isDown || moveRight) { player.setVelocityX(400); player.setFlipX(false); lastDirection = 'right'; }
        else { player.setVelocityX(0); }
        if ((keys.W.isDown || spaceKey.isDown || doJump) && player.body.blocked.down) player.setVelocityY(-800);
    }
    
    bullets = bullets.filter(b => {
        if (!b.active) return false;
        this.physics.overlap(b, enemies, (bullet, enemy) => {
            let hp = enemy.getData('hp') - 1; enemy.setData('hp', hp); enemy.setTint(0xff0000);
            if (hp <= 0) { playSE(this, 'destroy'); enemy.destroy(); } else { playSE(this, 'hit'); }
            this.time.delayedCall(100, () => { if(enemy && enemy.active) enemy.clearTint(); });
            bullet.active = false; bullet.destroy();
        }); return b.active;
    });
}

function startQuiz(p, ship) {
    if (isQuizActive || isClear || isWaitingToStart) return;
    isQuizActive = true; p.setVelocityX(0);
    const overlay = this.add.rectangle(640, 360, 600, 500, 0x000000, 0.95).setStrokeStyle(4, 0xffffff).setScrollFactor(0);
    const qText = this.add.text(640, 240, '', { fontSize: '60px', color: '#fff' }).setOrigin(0.5).setScrollFactor(0);
    const buttons = [];
    for (let i = 0; i < 3; i++) {
        const btn = this.add.rectangle(640, 380 + (i * 80), 300, 60, 0x333333).setInteractive().setStrokeStyle(2, 0xffffff).setScrollFactor(0);
        const txt = this.add.text(640, 380 + (i * 80), '', { fontSize: '40px', color: '#fff' }).setOrigin(0.5).setScrollFactor(0);
        btn.txt = txt;
        btn.on('pointerdown', () => {
            if (btn.val === btn.ans) {
                playSE(this, 'quiz_correct'); [overlay, qText, ...buttons, ...buttons.map(b=>b.txt)].forEach(o => o.destroy());
                ship.destroy(); isQuizActive = false;
            } else { playSE(this, 'quiz_wrong'); btn.setFillStyle(0xff0000); this.time.delayedCall(300, () => generateProblem(qText, buttons)); }
        });
        buttons.push(btn);
    }
    generateProblem(qText, buttons);
}

function generateProblem(qText, buttons) {
    let n1 = Phaser.Math.Between(1, 10), n2 = Phaser.Math.Between(1, 9), ans = n1 + n2;
    qText.setText(`${n1} ＋ ${n2} = ?`);
    let opts = [ans, ans+1, ans-1]; Phaser.Utils.Array.Shuffle(opts);
    buttons.forEach((b, i) => { b.val = opts[i]; b.txt.setText(opts[i]); b.ans = ans; b.setFillStyle(0x333333); });
}

function spawnEnemy(scene) {
    if (isGameOver || isClear || isWaitingToStart) return;
    const e = scene.physics.add.sprite(scene.cameras.main.scrollX + 1400, 720 - 100, 'enemy_sprite').setScale(0.22).setOrigin(0.5, 1);
    e.setData('hp', 4); enemies.add(e); e.body.setVelocityX(-200);
}
function spawnBomb(scene) {
    if (isGameOver || isClear || isWaitingToStart) return;
    if (lastWasBomb || Math.random() > 0.2) { lastWasBomb = false; return; }
    const b = scene.physics.add.sprite(scene.cameras.main.scrollX + 1400, 720 - 60, 'bomb_sprite').setScale(0.08).setOrigin(0.5, 1);
    bombs.add(b); b.body.setVelocityX(-250); lastWasBomb = true;
}
function shoot(scene) {
    playSE(scene, 'shoot');
    const b = scene.add.rectangle(player.x + (lastDirection === 'right' ? 45 : -45), player.y - 70, 25, 6, 0xffff00);
    scene.physics.add.existing(b); b.body.setAllowGravity(false);
    b.body.setVelocityX(lastDirection === 'left' ? -1500 : 1500); b.active = true; bullets.push(b);
    scene.time.delayedCall(1000, () => { if(b.active) { b.active = false; b.destroy(); } });
}
function scheduleNextSpawn(scene) { scene.time.delayedCall(Phaser.Math.Between(2000, 4500), () => { if (!isGameOver && !isClear && !isWaitingToStart) { spawnEnemy(scene); scheduleNextSpawn(scene); } }); }
function scheduleNextBombSpawn(scene) { scene.time.delayedCall(2000, () => { if (!isGameOver && !isClear && !isWaitingToStart) { spawnBomb(scene); scheduleNextBombSpawn(scene); } }); }
function onPlayerHit() { if (!isGameOver && !isClear && !isWaitingToStart) { isGameOver = true; if(bgm) bgm.stop(); playSE(this, 'dead'); player.setTint(0xff0000); this.time.delayedCall(1000, () => this.scene.restart()); } }
function handleClear(scene) { if (isClear) return; isClear = true; player.setVelocity(0,0); enemies.clear(true,true); bombs.clear(true,true); if(bgm) bgm.stop(); scene.add.text(640, 360, 'CLEAR!!', { fontSize: '100px', fill: '#fff' }).setOrigin(0.5).setScrollFactor(0); scene.time.delayedCall(5000, () => scene.scene.restart()); }
function playSE(scene, type) { const ctx = scene.sound.context; const osc = ctx.createOscillator(); const gain = ctx.createGain(); if(type==='shoot'){osc.frequency.setValueAtTime(1200,ctx.currentTime); gain.gain.setValueAtTime(0.05,ctx.currentTime);} else if(type==='dead'){osc.frequency.setValueAtTime(100,ctx.currentTime); gain.gain.setValueAtTime(0.2,ctx.currentTime);} osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime+0.1); }
</script>
</body>
</html>
